name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please fill in as much as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Commands you ran.
      placeholder: |
        typhon-scan
        typhon-run --full
    validations:
      required: true

  - type: textarea
    id: hardware
    attributes:
      label: Hardware
      description: Paste the output of `typhon-scan` or describe your GPU/CPU/RAM.
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error output
      render: shell

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Ubuntu 22.04 / Windows 11 / macOS 14"
    validations:
      required: true
